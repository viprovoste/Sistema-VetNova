spring.application.name=ventas
server.port=8086

# Conexion a MySQL (ajustar usuario/clave segun el entorno local)
spring.datasource.url=jdbc:mysql://localhost:3306/bd_ventas
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URLs de los microservicios con los que Ventas se comunica
vetnova.auth.url=http://localhost:8081
vetnova.inventario.url=http://localhost:8085

# Sucursal/bodega central usada para verificar y descontar stock de las compras realizadas por el canal web
vetnova.inventario.sucursal-web-id=1

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
